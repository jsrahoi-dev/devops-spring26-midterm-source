name: RC Release

on:
  push:
    tags:
      - 'v*.*.*-rc*'

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: color-perception-spa

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "📦 Building version: $VERSION"

      - name: Configure AWS credentials
        id: aws-credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::899088266694:role/GitHubActionsDeployRole
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          IMAGE_TAG: ${{ steps.version.outputs.IMAGE_TAG }}
        run: |
          echo "Building image with tags: $IMAGE_TAG, $VERSION"
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION \
            --label "version=$VERSION" \
            --label "git.commit=$GITHUB_SHA" \
            --label "build.date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            .

      - name: Run smoke tests
        id: smoke-tests
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.version.outputs.IMAGE_TAG }}
        run: |
          docker run -d --name test-db -e MYSQL_ROOT_PASSWORD=test -e MYSQL_DATABASE=color_app mysql:8
          sleep 30
          docker run -d --name test-app --link test-db:db \
            -e DB_HOST=db -e DB_USER=root -e DB_PASSWORD=test \
            -e DB_NAME=color_app -e SESSION_SECRET=test -e NODE_ENV=production \
            -p 3000:3000 $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          sleep 15
          curl -sf http://localhost:3000/api/health || exit 1
          echo "✅ Smoke tests passed!"

      - name: Push to ECR
        id: push-ecr
        if: success()
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          IMAGE_TAG: ${{ steps.version.outputs.IMAGE_TAG }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION
          echo "✅ Image pushed with tags: $IMAGE_TAG, $VERSION"

      - name: Trigger RC deployment
        id: trigger-deployment
        if: success()
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          INFRA_REPO_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $INFRA_REPO_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/jsrahoi-dev/devops-spring26-midterm-infra/dispatches \
            -d "{\"event_type\":\"rc-release\",\"client_payload\":{\"version\":\"$VERSION\",\"sha\":\"$GITHUB_SHA\"}}"
          echo "✅ Triggered RC deployment for $VERSION"

      - name: Cleanup
        if: always()
        run: |
          docker stop test-app test-db 2>/dev/null || true
          docker rm test-app test-db 2>/dev/null || true

      - name: Create release summary
        if: success()
        run: |
          echo "### 🎉 RC Release Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** ${{ steps.version.outputs.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image pushed to ECR and RC deployment triggered!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "- Monitor deployment: https://github.com/jsrahoi-dev/devops-spring26-midterm-infra/actions" >> $GITHUB_STEP_SUMMARY
          echo "- Test at: https://rc.rahoi.dev" >> $GITHUB_STEP_SUMMARY

      - name: Create failure summary
        if: failure()
        run: |
          echo "### ❌ RC Release Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stage Outcomes:" >> $GITHUB_STEP_SUMMARY
          echo "- Checkout: ${{ steps.checkout.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- AWS Credentials: ${{ steps.aws-credentials.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ steps.build.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Smoke Tests: ${{ steps.smoke-tests.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Push to ECR: ${{ steps.push-ecr.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger Deployment: ${{ steps.trigger-deployment.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick Links:" >> $GITHUB_STEP_SUMMARY
          echo "- [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- [RC Environment](https://rc.rahoi.dev)" >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const failedStage =
              '${{ steps.checkout.outcome }}' === 'failure' ? 'Checkout' :
              '${{ steps.aws-credentials.outcome }}' === 'failure' ? 'AWS Credentials' :
              '${{ steps.build.outcome }}' === 'failure' ? 'Docker Build' :
              '${{ steps.smoke-tests.outcome }}' === 'failure' ? 'Smoke Tests' :
              '${{ steps.push-ecr.outcome }}' === 'failure' ? 'Push to ECR' :
              '${{ steps.trigger-deployment.outcome }}' === 'failure' ? 'Trigger Deployment' :
              'Unknown';

            const title = `❌ RC Release Failed - ${failedStage} Stage - ${{ steps.version.outputs.VERSION }}`;

            const body = `## RC Release Failure Report

            **Failed Stage:** ${failedStage}
            **Version:** ${{ steps.version.outputs.VERSION }}
            **Workflow Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            **Triggered by:** ${{ github.event_name }}
            **Time:** ${new Date().toISOString()}

            ### Stage Outcomes:
            - Checkout: ${{ steps.checkout.outcome }}
            - AWS Credentials: ${{ steps.aws-credentials.outcome }}
            - Build: ${{ steps.build.outcome }}
            - Smoke Tests: ${{ steps.smoke-tests.outcome }}
            - Push to ECR: ${{ steps.push-ecr.outcome }}
            - Trigger Deployment: ${{ steps.trigger-deployment.outcome }}

            ### Quick Links:
            - [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - [RC Environment](https://rc.rahoi.dev)
            - [View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ### Recommended Actions:
            1. Check the workflow logs for detailed error messages
            2. Verify AWS credentials and permissions
            3. If build failed, check Docker configuration
            4. If tests failed, check application health
            5. Review recent code changes`;

            // Check if issue already exists for today
            const today = new Date().toISOString().split('T')[0];
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'rc-release-failure',
              state: 'open'
            });

            const existingIssue = issues.find(issue =>
              issue.title.includes(today) && issue.title.includes('${{ steps.version.outputs.VERSION }}')
            );

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `### Another failure occurred\n\n${body}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['rc-release-failure', 'automated']
              });
            }

      - name: Send email notification on failure
        if: failure() && vars.NOTIFICATION_EMAIL != ''
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ vars.NOTIFICATION_EMAIL }}
          password: ${{ secrets.NOTIFICATION_EMAIL_PASSWORD }}
          subject: "❌ RC Release Failed - Run #${{ github.run_number }}"
          to: ${{ vars.NOTIFICATION_EMAIL }}
          from: GitHub Actions
          body: |
            RC Release Failed

            Version: ${{ steps.version.outputs.VERSION }}
            Repository: ${{ github.repository }}
            Workflow: RC Release
            Run Number: ${{ github.run_number }}

            View logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            RC Environment: https://rc.rahoi.dev
          ignore_missing_if: true
